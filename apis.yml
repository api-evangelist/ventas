aid: ventas
name: Ventas
description: >-
  Ventas, Inc. is an S&P 500 healthcare real estate investment trust (REIT) and
  one of the largest owners of senior housing communities, medical office buildings,
  life science research facilities, and health system facilities in the United States,
  Canada, and United Kingdom. Ventas operates the Ventas OI proprietary data platform
  for operational intelligence across its portfolio of approximately 1,400 properties.
  Ventas does not offer a public developer API; data access is available through
  financial data providers and SEC EDGAR filings.
